<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jimena Villalobos Orduña | Animation Portfolio</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #050505;
      color: #f1f1f1;
    }

    h1, h2 {
      font-family: 'Playfair Display', serif;
    }

    /* 🔥 HEADER CON IMAGEN QUE SÍ FUNCIONA */
    header {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;

      /* imagen externa (segura) */
      background-image: url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee");
      
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* capa oscura encima SIN romper la imagen */
    header::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.55);
      z-index: 0;
    }

    header h1,
    header p {
      position: relative;
      z-index: 1;
    }

    header h1 {
      font-size: 3.5rem;
      margin-bottom: 10px;
    }

    header p {
      font-size: 1.2rem;
      opacity: 0.9;
    }

    section {
      padding: 100px 10%;
      text-align: center;
    }

    footer {
      text-align: center;
      padding: 40px;
      opacity: 0.5;
    }

  </style>
</head>

<body>

<header>
  <h1>Jimena Villalobos Orduna</h1>
  <p>Animation • Visual Storytelling • Direction</p>
</header>

<section>
  <h2>Sobre mí</h2>
  <p>
    Artista enfocada en animación y narrativa audiovisual. Explorando lo emocional a través de la imagen.
  </p>
</section>

<footer>
  <p>© 2026 Jimena Villalobos Orduña</p>
</footer>

</body>
</html>
