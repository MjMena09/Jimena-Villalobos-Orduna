<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jimena Villalobos Orduña | Animation Portfolio</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #050505;
      color: #f1f1f1;
    }

    h1, h2 {
      font-family: 'Playfair Display', serif;
    }

    /* HEADER SIN DEGRADADO */
    header {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;

      background-image: url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    header h1 {
      font-size: 3.5rem;
      margin-bottom: 10px;
      text-shadow: 0 0 15px black;
    }

    header p {
      font-size: 1.2rem;
      text-shadow: 0 0 10px black;
    }

    section {
      padding: 100px 10%;
      text-align: center;
    }

    /* PROYECTOS */
    .projects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 30px;
      margin-top: 40px;
    }

    .card {
      position: relative;
      overflow: hidden;
      border-radius: 20px;
      cursor: pointer;
    }

    .card img {
      width: 100%;
      height: 350px;
      object-fit: cover;
      transition: 0.5s;
    }

    .card:hover img {
      transform: scale(1.1);
      filter: brightness(0.3);
    }

    .card-content {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      padding: 20px;
      opacity: 0;
      transform: translateY(20px);
      transition: 0.4s;
    }

    .card:hover .card-content {
      opacity: 1;
      transform: translateY(0);
    }

    .card h3 {
      margin-bottom: 10px;
    }

    /* DEMOREEL */
    .video-container {
      margin-top: 40px;
      display: flex;
      justify-content: center;
    }

    .video-container iframe {
      width: 80%;
      height: 450px;
      border-radius: 15px;
    }

    footer {
      text-align: center;
      padding: 40px;
      opacity: 0.5;
    }

  </style>
</head>

<body>

<header>
  <h1>Jimena Villalobos Orduna</h1>
  <p>Animation • Visual Storytelling • Direction</p>
</header>

<section>
  <h2>Sobre mí</h2>
  <p>INSERTAR TEXTO AQUÍ</p>
</section>

<section>
  <h2>Proyectos</h2>

  <div class="projects">

    <!-- PROYECTO 1 -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1518770660439-4636190af475">
      <div class="card-content">
        <h3>Proyecto 1</h3>
        <p>INSERTAR TEXTO AQUÍ</p>
      </div>
    </div>

    <!-- PROYECTO 2 -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
      <div class="card-content">
        <h3>Proyecto 2</h3>
        <p>INSERTAR TEXTO AQUÍ</p>
      </div>
    </div>

    <!-- PROYECTO 3 -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7">
      <div class="card-content">
        <h3>Proyecto 3</h3>
        <p>INSERTAR TEXTO AQUÍ</p>
      </div>
    </div>

  </div>
</section>

<section>
  <h2>Demoreel</h2>

  <div class="video-container">
    <iframe 
      src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
      frameborder="0" 
      allowfullscreen>
    </iframe>
  </div>

</section>

<section>
  <h2>Contacto</h2>
  <p>INSERTAR TEXTO AQUÍ</p>
</section>

<footer>
  <p>© 2026 Jimena Villalobos Orduña</p>
</footer>

</body>
</html>
